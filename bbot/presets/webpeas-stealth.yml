description: >
  SuizerAudit stealth mode — autonomous recon with minimal noise.
  WebPeas terminal output: colour-coded, section-grouped, concise.
  No brute-force, no aggressive fuzzing, passive-first approach.
  JS analysis via JsFuzzer including source map unpacking.

modules:
  - httpx
  - robots
  - securitytxt
  - sslcert
  - ntlm
  - wafw00f
  - badsecrets
  - bypass403
  - jsfuzzer

output_modules:
  - webpeas
  - json

config:
  scope:
    strict: true
    search_distance: 0
    report_distance: 0

  dns:
    minimal: true
    search_distance: 0

  web:
    spider_distance: 2
    spider_depth: 3
    spider_links_per_page: 15

  modules:
    jsfuzzer:
      tool_path: /app/JsFuzzer
      severity_filter:
        - critical
        - high
        - medium
        - info

  consulting:
    request_delay_min: 1.0
    request_delay_max: 3.0
