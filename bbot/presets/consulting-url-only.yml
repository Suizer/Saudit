description: >
  Consultancy mode — narrow scope (single URL).
  Use when the engagement provides only a specific URL with no subdomain/IP authorization.
  No DNS brute-force, no subdomain expansion, strict scope.
  Applies inter-request jitter to reduce detection footprint.

modules:
  - httpx
  - robots
  - securitytxt
  - retirejs
  - ntlm
  - jsfuzzer
  - mendix_recon
  - badsecrets
  - bypass403

output_modules:
  - consulting_report
  - json
  - stdout

config:
  scope:
    strict: true
    search_distance: 0
    report_distance: 0

  dns:
    minimal: true
    search_distance: 0

  web:
    spider_distance: 1
    spider_depth: 2
    spider_links_per_page: 10

  modules:
    jsfuzzer:
      tool_path: /app/JsFuzzer
      severity_filter:
        - critical
        - high
        - medium
        - info

  # Enable inter-request jitter: uniform random delay 1–3 s per request
  consulting:
    request_delay_min: 1.0
    request_delay_max: 3.0
