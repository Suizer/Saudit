description: Discover web parameters and lightly fuzz them for vulnerabilities. Uses all lightfuzz modules, without some of the more intense discovery techniques. Does not send POST requests. Avoids running against confirmed WAFs.

include:
  - lightfuzz-light

modules:
  - badsecrets
  - hunt
  - reflected_parameters
  
config:
  modules:
    lightfuzz:
      enabled_submodules: [cmdi,crypto,path,serial,sqli,ssti,xss]
