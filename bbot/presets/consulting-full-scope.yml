description: >
  Consultancy mode — full scope (domain / IP range authorized).
  Use when the engagement provides a full domain, list of domains, or IP ranges.
  Enables subdomain enumeration and port awareness while keeping noise low:
  DNS brute threads reduced from 1000 → 30, inter-request jitter applied.

include:
  - web-basic

flags:
  - subdomain-enum

modules:
  - jsfuzzer
  - mendix_recon

output_modules:
  - consulting_report
  - json
  - subdomains
  - stdout

config:
  scope:
    strict: false
    search_distance: 1
    report_distance: 0

  dns:
    threads: 10
    brute_threads: 30
    search_distance: 1

  web:
    spider_distance: 2
    spider_depth: 3
    spider_links_per_page: 15

  # Lighter jitter for broader scans — still detectable-friendly
  consulting:
    request_delay_min: 0.5
    request_delay_max: 2.0
