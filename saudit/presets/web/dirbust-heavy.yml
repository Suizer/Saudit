description: Recursive web directory brute-force (aggressive)

flags:
  - iis-shortnames

modules:
  - httpx
  - ffuf

config:
  modules:
    iis_shortnames:
      detect_only: False
    ffuf:
      depth: 3
      lines: 5000
      extensions:
        - php
        - asp
        - aspx
        - ashx
        - asmx
        - jsp
        - jspx
        - cfm
        - zip
        - conf
        - config
        - xml
        - json
        - yml
        - yaml
