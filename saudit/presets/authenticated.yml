description: >
  Authenticated recon — extends the initial preset with modules that require
  an active session to discover meaningful attack surface.
  Pass credentials with --bearer <token> or --cookie name=value.

include:
  - initial

modules:
  - paramminer_getparams
  - paramminer_headers
  - reflected_parameters

config:
  web:
    spider_distance: 3
    spider_depth: 5
    spider_links_per_page: 30

  modules:
    paramminer_getparams:
      wordlist: ""
      recycle_words: true
      random: true
      do_body: false

    paramminer_headers:
      wordlist: ""
      recycle_words: true
      random: true

    reflected_parameters:
      severity: low
