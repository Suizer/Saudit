description: >
  Initial recon — passive-first fingerprinting with no brute-force.
  Detects technologies, analyzes JavaScript, discovers APIs and exposed secrets,
  checks security headers, and performs subdomain discovery via SSL certificates.
  Safe to run on any authorized target as a first step.

modules:
  - httpx
  - robots
  - securitytxt
  - ntlm
  - wafw00f
  - sslcert
  - oauth
  - azure_realm
  - badsecrets
  - jsfuzzer
  - retirejs
  - git
  - code_repository
  - gitdumper
  - gitlab_onprem
  - swagger_probe
  - graphql_introspection
  - hunt
  - security_headers
  - nuclei
  - cms_advisor

output_modules:
  - html_report
  - json
  - ai_review
  - stdout

config:
  scope:
    strict: true
    search_distance: 0
    report_distance: 0

  dns:
    search_distance: 0

  web:
    spider_distance: 3
    spider_depth: 5
    spider_links_per_page: 30

  modules:
    nuclei:
      tags: tech
    jsfuzzer:
      severity_filter:
        - critical
        - high
        - medium
        - info
    gitlab_onprem:
      api_key: ""

conditions:
  - |
    {% if not config.modules.gitlab_onprem.api_key %}
      {{ warn("gitlab_onprem: no api_key set — only public repositories will be discovered. Set -c modules.gitlab_onprem.api_key=<token> for full coverage.") }}
    {% endif %}
