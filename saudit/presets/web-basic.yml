description: >
  Standard web audit without authentication.
  Extends initial recon with 403 bypass, subdomain takeover detection,
  surface-level directory discovery, file harvesting and API probing.
  Add a nuclei sub-preset explicitly when ready: -p nuclei, -p nuclei-budget, -p nuclei-technology.
  Wordlist can be overridden with -c modules.ffuf.wordlist=<path_or_url>.

include:
  - initial

modules:
  - bypass403
  - baddns
  - ffuf
  - filedownload
  - extractous
  - api_probe

output_modules:
  - html_report
  - json
  - ai_review
  - stdout

config:
  modules:
    ffuf:
      wordlist: "https://raw.githubusercontent.com/danielmiessler/SecLists/master/Discovery/Web-Content/raft-small-directories.txt"
      lines: 2000
      max_depth: 1
      rate: 50
      extensions: ""
